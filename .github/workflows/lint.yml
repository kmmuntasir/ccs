name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck -s bash -S warning *.sh

  bashate:
    name: bashate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bashate
        run: pip install bashate

      - name: Run bashate
        run: bashate *.sh
