name: Question
description: Ask a question about CCS usage or configuration
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What have you already tried? What docs did you check?
    validations:
      required: false
