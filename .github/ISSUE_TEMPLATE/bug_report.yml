name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Run `ccs ...`
        2. Select ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error output.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 15, Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: shell
    attributes:
      label: Shell
      placeholder: e.g. bash 5.2, zsh 5.9, fish 3.7
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: CCS Version
      description: Run `ccs --version` if available, otherwise note the commit or "latest"
      placeholder: e.g. 1.0.0
    validations:
      required: false
